---
- name: Ensure updated Content
  hosts: all
  gather_facts: false

  vars:
    org_name: sjl_t2

    operating_systems:
      - rhel10

    do_sync: true

    repositories: >-
      {%- set repos = [] -%}
      {%- for os in operating_systems -%}
      {%- set v = os | regex_replace('^rhel', '') -%}
      {%- set cv = "cv_" ~ os -%}

      {%- set _ = repos.append([
            "Red Hat Enterprise Linux for x86_64",
            "Red Hat Enterprise Linux " ~ v ~ " for x86_64 - AppStream (RPMs)",
            v,
            cv
          ]) -%}

      {%- set _ = repos.append([
            "Red Hat Enterprise Linux for x86_64",
            "Red Hat Enterprise Linux " ~ v ~ " for x86_64 - BaseOS (RPMs)",
            v,
            cv
          ]) -%}

      {%- set _ = repos.append([
            "Red Hat Enterprise Linux for x86_64",
            "Red Hat Satellite Client 6 for RHEL " ~ v ~ " x86_64 (RPMs)",
            v,
            cv
          ]) -%}

      {%- endfor -%}

      {{ repos }}

  tasks:
    - name: Retrieve the organisation information by running hammer organization info --name "{{ org_name }}" --output json
      ansible.builtin.command:
        argv:
          - hammer
          - --output
          - json
          - organization
          - info
          - --name
          - "{{ org_name }}"
      register: org_lookup
      changed_when: false

    - name: Store the organisation ID
      set_fact:
        organization_id: >-
          {{
            (
              org_lookup.stdout
              | from_json
            ).Id
          }}

    # -------------------------------------------------------------------------
    # Ensure repository set is enabled for the requested operating system
    # Example of what this task's vars might look like:
    #   product: "Red Hat Enterprise Linux for x86_64"
    #   repository: "Red Hat Satellite Client 6 for RHEL 9 x86_64 (RPMs)"
    #   releasever: 9
    #   cv: cv_rhel9
    # The repositores list is autogenerated using the jinja template in this playbook
    # From the list of operating_systems provided as an input. Each item on that list
    # Contains four elements that map to product, repository, releasever and cv the repo is for 
    # -------------------------------------------------------------------------
    - name: Ensure Repositories are Enabled and Synced and Set in Content Views
      include_role:
        name: sat-mt-hammer
        tasks_from: reposet_ensure.yaml
      vars:
        product: "{{ item.0 }}"
        repository: "{{ item.1 }}"
        releasever: "{{ item.2 }}"
        cv: "{{ item.3 }}"
      loop: "{{ repositories }}"

