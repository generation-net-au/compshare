---
- name: Query repository set
  command: >
    hammer repository-set show
    --organization-id "{{ organization_id }}"
    --product "{{ product }}"
    --name "{{ repository }}"
  register: repo_set
  changed_when: false

- name: Check if repository is enabled
  set_fact:
    repo_enabled: "{{ '1)' in repo_set.stdout }}"

- name: Enable repository set if not already enabled
  command: >
    hammer repository-set enable
    --organization-id "{{ organization_id }}"
    --product "{{ product }}"
    --basearch x86_64
    --releasever {{ releasever }}
    --name "{{ repository }}"
  register: enable_result
  when: not repo_enabled 

- name: Re-query repository set to capture repo name
  command: >
    hammer repository-set show
    --organization-id "{{ organization_id }}"
    --product "{{ product }}"
    --name "{{ repository }}"
  register: repo_set_with_reponame
  changed_when: false

- name: Extract enabled repository name
  set_fact:
    enabled_repository: >-
      {{
        (repo_set_with_reponame.stdout
         | regex_findall('(?m)^\\s*Name:\\s*(.+)$')
        | last)
      }}

- name: Synchronize repository
  command: >
    hammer repository synchronize
    --organization-id "{{ organization_id }}"
    --product "{{ product }}"
    --name "{{ enabled_repository }}"
  when: do_sync | bool
